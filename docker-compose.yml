services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feedrss_app
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MvcFeedContext: Data Source=/app/DB/feedrss.db
    volumes:
      - feedrss_data:/app/DB
    networks:
      - web

  caddy:
    image: caddy:2
    container_name: feedrss_caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

volumes:
  feedrss_data:
  caddy_data:
  caddy_config:

networks:
  web:
